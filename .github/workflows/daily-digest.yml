name: Daily Finance Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TOPICS_MACRO:           ${{ vars.TOPICS_MACRO }}
          TOPICS_EQUITIES:        ${{ vars.TOPICS_EQUITIES }}
          TOPICS_FIXED_INCOME:    ${{ vars.TOPICS_FIXED_INCOME }}
          TOPICS_COMMODITIES:     ${{ vars.TOPICS_COMMODITIES }}
          TOPICS_CRYPTO_FX:       ${{ vars.TOPICS_CRYPTO_FX }}
          REPORT_DEPTH:           ${{ vars.REPORT_DEPTH }}
          EMAIL_RECIPIENTS:       ${{ secrets.EMAIL_RECIPIENTS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: npx ts-node src/orchestrator.ts

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finance-digest-${{ github.run_id }}
          path: reports/
